name: Build Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Fabric 1.16.5 ────────────────────────────────────────────────────────────
  build-fabric:
    name: Build Fabric 1.16.5
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Fabric subproject
        run: ./gradlew :fabric:build

      - name: Upload Fabric jar
        uses: actions/upload-artifact@v4
        with:
          name: durability-hud-fabric-1.16.5
          path: fabric/build/libs/durability-hud-fabric-1.16.5-*.jar
          if-no-files-found: error

  # ── Forge 1.21 ───────────────────────────────────────────────────────────────
  build-forge:
    name: Build Forge 1.21
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Forge subproject
        run: ./gradlew :forge:build

      - name: Upload Forge jar
        uses: actions/upload-artifact@v4
        with:
          name: durability-hud-forge-1.21
          path: forge/build/libs/durability-hud-forge-1.21-*.jar
          if-no-files-found: error
